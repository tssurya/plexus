---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: plexus-controller
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8s.ovn.org
  resources:
  - clusteruserdefinednetworks
  - routeadvertisements
  - vteps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8s.ovn.org
  resources:
  - clusteruserdefinednetworks/status
  - routeadvertisements/status
  - vteps/status
  verbs:
  - get
- apiGroups:
  - plexus.io
  resources:
  - administrativenetworkdomains
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - plexus.io
  resources:
  - administrativenetworkdomains/finalizers
  verbs:
  - update
- apiGroups:
  - plexus.io
  resources:
  - administrativenetworkdomains/status
  verbs:
  - get
  - patch
  - update
