version: "2"

linters:
  default: none
  enable:
    - kubeapilinter

  settings:
    custom:
      kubeapilinter:
        type: module
        description: Kube API Linter lints Kube like APIs based on API conventions and best practices.
        settings:
          linters: {}
          lintersConfig: {}

  exclusions:
    rules:
      - linters:
          - kubeapilinter
        path-except: "api/"
