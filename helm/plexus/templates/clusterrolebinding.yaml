apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "plexus.name" . }}
  labels:
    {{- include "plexus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "plexus.name" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "plexus.name" . }}
  namespace: {{ include "plexus.namespace" . }}
