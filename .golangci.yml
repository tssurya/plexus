version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    goimports:
      local-prefixes: github.com/ovn-kubernetes/plexus
